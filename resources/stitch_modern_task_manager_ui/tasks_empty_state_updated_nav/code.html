<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskFlow - My Tasks</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>

            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1b1b24",
                        "surface-container": "#f0ecf9",
                        "primary-container": "#4f46e5",
                        "secondary-fixed": "#6ffbbe",
                        "primary-fixed-dim": "#c3c0ff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#351000",
                        "secondary": "#006c49",
                        "on-primary-container": "#dad7ff",
                        "primary-fixed": "#e2dfff",
                        "on-surface": "#1b1b24",
                        "surface-container-highest": "#e4e1ee",
                        "surface-bright": "#fcf8ff",
                        "secondary-container": "#6cf8bb",
                        "on-secondary-fixed": "#002113",
                        "tertiary": "#7e3000",
                        "surface-container-high": "#eae6f4",
                        "on-secondary-container": "#00714d",
                        "inverse-primary": "#c3c0ff",
                        "on-secondary-fixed-variant": "#005236",
                        "outline": "#777587",
                        "background": "#fcf8ff",
                        "inverse-surface": "#302f39",
                        "inverse-on-surface": "#f3effc",
                        "on-primary-fixed": "#0f0069",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-tertiary-container": "#ffd2be",
                        "surface": "#fcf8ff",
                        "on-error": "#ffffff",
                        "primary": "#3525cd",

                        "tertiary-fixed": "#ffdbcc",

                        "on-surface-variant": "#464555",
                        "error": "#ba1a1a",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "base": "4px",
                        "gutter": "20px",
                        "sm": "8px",
                        "md": "16px",
                        "container-margin": "32px",
                        "xl": "40px"
                    },
                    "fontFamily": {
                        "h2": ["Inter", "sans-serif"],
                        "body-sm": ["Inter", "sans-serif"],
                        "button": ["Inter", "sans-serif"],
                        "h1": ["Inter", "sans-serif"],
                        "label-md": ["Inter", "sans-serif"],
                        "h3": ["Inter", "sans-serif"],
                        "body-base": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.015em", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],

                        "body-base": ["14px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }]
                    }
                }
            }
        }

</head>
<body class="bg-background text-on-background font-body-base text-body-base min-h-screen">
<!-- TopNavBar -->
<nav class="bg-surface-container-lowest border-b border-outline-variant shadow-sm flex items-center justify-between px-6 h-14 w-full z-50 fixed top-0">
<div class="flex items-center gap-4">
<span class="text-primary font-h3 text-h3 tracking-tight">TaskFlow</span>
</div>
<div class="flex items-center bg-surface-container-low border border-outline-variant rounded-md px-3 py-1.5 w-64 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-[18px] mr-2" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-body-sm font-body-sm p-0 w-full text-on-surface placeholder:text-on-surface-variant" placeholder="Search..." type="text"/>
</div>
<div class="flex items-center gap-4">
<button class="bg-primary text-on-primary font-button text-button px-4 py-2 rounded-lg hover:bg-primary-fixed-variant transition-colors active:scale-95 duration-150 border-t border-white/20">
                New Task
            </button>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full text-on-surface-variant hover:bg-surface-container hover:text-on-surface transition-colors active:scale-95 duration-150 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 rounded-full text-on-surface-variant hover:bg-surface-container hover:text-on-surface transition-colors active:scale-95 duration-150 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
<div class="w-8 h-8 rounded-full bg-surface-dim border border-outline-variant overflow-hidden ml-2 cursor-pointer active:scale-95 transition-all duration-150">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Minimalist abstract avatar placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlNngoHIAt6Y2DdSfhC-yXi9O4wcbsLJwd0-Cxj_yppM84vHG_u6qCu2aFiN4Ux7spTVhegtTRiXimh2Vb4JlS_5MgwUVKfy9jbYwc1Wzd2cxhDCnRue7oH_E1H6rXEB61XYJVCcFx3VRr1iA7jgAwr8CLecr2lTY_buQKur5ibtGrh331bXrRvDQ8FGBbK72dwbOqmS6yDvwSthtPrXbJWXF1nr1uEgCAyBlKuLfqrJ0xgTuHTjcUcZBV2bSXZY9Q-1ZtXaYc7Xs"/>
</div>
</div>
</nav>
<!-- SideNavBar -->
<aside class="bg-surface-container-low border-r border-outline-variant flex flex-col py-4 px-3 gap-2 h-screen fixed left-0 w-[240px] top-14 z-40">
<div class="px-3 py-2 mb-4 flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest border border-outline-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="domain">domain</span>
</div>
<div class="flex flex-col">
<span class="font-h3 text-[15px] leading-tight text-on-background">Acme Corp</span>
<span class="font-label-md text-label-md text-on-surface-variant">Professional Plan</span>
</div>
</div>
<nav class="flex-1 flex flex-col gap-1">
<a class="flex items-center gap-3 px-3 py-2 rounded-md font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="inbox">inbox</span>
                Inbox
            </a>
<a class="flex items-center gap-3 px-3 py-2 rounded-md font-body-sm text-body-sm bg-surface-container-lowest text-primary shadow-sm border border-outline-variant transition-all duration-200 ease-in-out font-medium" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="task_alt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">task_alt</span>
                My Tasks
            </a>
</nav>
<div class="mt-auto flex flex-col gap-1 border-t border-outline-variant pt-4 pb-14">
<a class="flex items-center gap-3 px-3 py-2 rounded-md font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="contact_support">contact_support</span>
                Support
            </a>
</div>
</aside>
<!-- Main Content Area -->
<main class="ml-[240px] pt-14 min-h-screen flex items-center justify-center p-8">
<!-- Empty State Container -->
<div class="flex flex-col items-center justify-center text-center max-w-md w-full">
<!-- Minimalist Illustration / Icon -->
<div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center mb-6 shadow-sm border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[48px] opacity-80" data-icon="checklist">checklist</span>
</div>
<!-- Text Content -->
<h1 class="font-h2 text-h2 text-on-surface mb-3">No tasks yet</h1>
<p class="font-body-base text-body-base text-on-surface-variant mb-8 max-w-[280px]">
                Get started by creating your first task to stay organized and productive.
            </p>
<!-- Primary Action -->
<button class="bg-primary text-on-primary font-button text-button px-6 py-3 rounded-lg hover:bg-primary-fixed-variant transition-all active:scale-95 duration-150 border-t border-white/20 shadow-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="add">add</span>
                New Task
            </button>
</div>
</main>
</body></html>
