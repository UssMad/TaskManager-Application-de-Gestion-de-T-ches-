<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskFlow - Log In</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->

        darkMode: "class",
        theme: {

                    "surface-container-high": "#eae6f4",
                    "surface-container": "#f0ecf9",
                    "primary-fixed": "#e2dfff",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#4d44e3",
                    "outline": "#777587",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#ffb695",
                    "on-secondary-container": "#00714d",
                    "on-secondary-fixed-variant": "#005236",
                    "on-secondary-fixed": "#002113",
                    "inverse-surface": "#302f39",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "on-primary-fixed-variant": "#3323cc",
                    "on-primary-fixed": "#0f0069",
                    "surface-variant": "#e4e1ee",
                    "surface-bright": "#fcf8ff",
                    "secondary": "#006c49",
                    "primary-container": "#4f46e5",
                    "secondary-fixed": "#6ffbbe",
                    "outline-variant": "#c7c4d8",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#e4e1ee",
                    "inverse-on-surface": "#f3effc",
                    "secondary-fixed-dim": "#4edea3",
                    "tertiary": "#7e3000",
                    "primary-fixed-dim": "#c3c0ff",
                    "on-tertiary-fixed": "#351000",
                    "on-primary-container": "#dad7ff",
                    "inverse-primary": "#c3c0ff",
                    "on-surface": "#1b1b24",
                    "on-tertiary-container": "#ffd2be",
                    "surface": "#fcf8ff",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-dim": "#dcd8e5",
                    "secondary-container": "#6cf8bb",
                    "on-surface-variant": "#464555",
                    "tertiary-fixed": "#ffdbcc"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "lg": "24px",
                    "xs": "4px",
                    "gutter": "20px",
                    "container-margin": "32px",
                    "md": "16px",
                    "xl": "40px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "h1": ["Inter"],
                    "body-base": ["Inter"],
                    "label-md": ["Inter"],
                    "h3": ["Inter"],
                    "h2": ["Inter"],

                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-base": ["14px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-surface min-h-screen flex items-center justify-center p-6 antialiased">
<!-- Main Canvas -->
<main class="w-full max-w-[400px]">
<!-- Logo Header -->
<div class="flex justify-center mb-8">
<div class="flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 28px; color: #3525cd;">check_circle</span>
<span class="font-h3 text-h3 tracking-tight">TaskFlow</span>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0px_4px_12px_rgba(0,0,0,0.03)] p-8">
<div class="mb-8 text-center">
<h1 class="font-h2 text-h2 text-on-surface mb-2">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="email">Email address</label>
<input class="h-10 px-3 w-full bg-surface-container-lowest border border-outline-variant rounded-md font-body-base text-body-base text-on-surface placeholder-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<input class="h-10 px-3 w-full bg-surface-container-lowest border border-outline-variant rounded-md font-body-base text-body-base text-on-surface placeholder-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-1">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full h-10 bg-primary text-on-primary font-button text-button rounded-lg shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center" type="submit">
                        Log In
                    </button>
</div>
</form>
<!-- Registration Link -->
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-primary hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
</main>
</body></html>
